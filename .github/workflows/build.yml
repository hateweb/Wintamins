name: Build

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: windows-latest

    defaults:
      run:
        shell: msys2 {0}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up dependencies
      uses: msys2/setup-msys2@v2
      with:
        msystem: UCRT64
        update: true
        cache: true
        install: >-
          make
          mingw-w64-ucrt-x86_64-clang

    - name: Build
      run: |
        make ARCH=64
        make ARCH=32

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: win-builds
        path: |
          ${{ github.workspace }}/out/Wintamins64.exe
          ${{ github.workspace }}/out/Wintamins32.exe
