name: Upload version to different repo
on:
  workflow_dispatch:
  push:
    tags:
      - '*'

jobs:
  upload-version:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source repository
        uses: actions/checkout@v4

      - name: Checkout target repository
        uses: actions/checkout@v4
        with:
          repository: 'hateweb/hateweb.github.io'
          token: ${{ secrets.TARGET_REPO_PAT }}
          path: 'target-repo'

      - name: Create or update version.txt
        run: echo "${GITHUB_REF_NAME}" > target-repo/version.txt

      - name: Commit and push changes
        working-directory: target-repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add version.txt
          git commit -m "chore: update version to ${GITHUB_REF_NAME}"
          git push
